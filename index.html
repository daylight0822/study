<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Language Study</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- Header -->
  <header>
    <h1>Language Study</h1>
    <div class="lang-toggle">
      <button class="lang-btn active" data-lang="both">영어 + 중국어</button>
      <button class="lang-btn" data-lang="en">영어만</button>
      <button class="lang-btn" data-lang="zh">중국어만</button>
    </div>
  </header>

  <main>
    <!-- Home: 주제 목록 -->
    <div id="homeView">
      <div class="level-filter">
        <button class="filter-btn active" data-level="all">전체</button>
        <button class="filter-btn" data-level="기초">기초</button>
        <button class="filter-btn" data-level="중급">중급</button>
        <button class="filter-btn" data-level="비즈니스">비즈니스</button>
      </div>
      <div class="topic-grid" id="topicGrid"></div>
    </div>

    <!-- Study View -->
    <div id="studyView" class="hidden">
      <div class="study-header">
        <button id="backBtn" class="btn-ghost">← 목록</button>
        <div class="study-title-wrap">
          <h2 id="studyTitle"></h2>
          <span class="badge" id="studyLevel"></span>
        </div>
        <button id="pdfBtn" class="btn-primary">PDF 저장</button>
      </div>

      <!-- 표현 학습 -->
      <div class="card">
        <div class="card-top">
          <h3>핵심 표현</h3>
          <div class="hide-btns" id="hideBtns"></div>
        </div>
        <div class="table-wrap">
          <table id="phraseTable">
            <thead>
              <tr>
                <th>한국어</th>
                <th class="col-en hidden-col">영어</th>
                <th class="col-zh hidden-col">중국어</th>
                <th class="col-py hidden-col">발음 (Pinyin)</th>
              </tr>
            </thead>
            <tbody id="phraseBody"></tbody>
          </table>
        </div>
      </div>

      <!-- 퀴즈 미리보기 -->
      <div class="card">
        <div class="card-top">
          <h3>퀴즈 미리보기</h3>
          <span class="hint">PDF에서 직접 써보세요</span>
        </div>
        <div id="quizPreview"></div>
      </div>
    </div>
  </main>

  <script src="data.js"></script>
  <script src="app.js"></script>
</body>
</html>
